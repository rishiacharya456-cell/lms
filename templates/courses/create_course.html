{% extends "base.html" %}
{% block content %}

<div class="p-6 flex justify-center bg-gray-100 min-h-screen">

    <div class="w-full max-w-3xl bg-white rounded-xl shadow p-6">

        <!-- HEADER -->
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Create Course</h2>
            <p class="text-sm text-gray-500">Add a complete course with academic structure</p>
        </div>

        <!-- FORM -->
        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <!-- NAME + CLASS -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Course Name
                    </label>
                    <input type="text" name="name" required
                           class="w-full border border-gray-300 focus:ring-2 focus:ring-indigo-500 p-2.5 rounded-lg outline-none"
                           placeholder="Enter course name">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Class
                    </label>
                    <select name="class_name"
                            class="w-full border border-gray-300 focus:ring-2 focus:ring-indigo-500 p-2.5 rounded-lg outline-none">
                        <option value="">Select Class</option>
                        <option value="6">Class 6</option>
                        <option value="7">Class 7</option>
                        <option value="8">Class 8</option>
                        <option value="9">Class 9</option>
                        <option value="10">Class 10</option>
                    </select>
                </div>

            </div>

            <!-- DESCRIPTION -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Description
                </label>
                <textarea name="description" rows="3"
                          class="w-full border border-gray-300 focus:ring-2 focus:ring-indigo-500 p-2.5 rounded-lg outline-none"
                          placeholder="Write short description"></textarea>
            </div>

            <!-- FEE + CREDIT -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Exam Fee (Rs.)
                    </label>
                    <input type="number" name="exam_fee" min="0"
                           class="w-full border border-gray-300 focus:ring-2 focus:ring-indigo-500 p-2.5 rounded-lg outline-none"
                           placeholder="Enter fee amount">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Credit Hour
                    </label>
                    <input type="number" name="credit_hour"
                           class="w-full border border-gray-300 focus:ring-2 focus:ring-indigo-500 p-2.5 rounded-lg outline-none"
                           placeholder="e.g. 3">
                </div>

            </div>

            <!-- MARKS STRUCTURE -->
            <div class="border-t pt-4">

                <h3 class="text-md font-semibold text-gray-700 mb-3">
                    Marks Structure
                </h3>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">

                    <div>
                        <label class="text-sm text-gray-600">Full Marks</label>
                        <input type="number" name="full_marks"
                               class="w-full border border-gray-300 p-2 rounded-lg"
                               placeholder="100">
                    </div>

                    <div>
                        <label class="text-sm text-gray-600">Pass Marks</label>
                        <input type="number" name="pass_marks"
                               class="w-full border border-gray-300 p-2 rounded-lg"
                               placeholder="40">
                    </div>

                    <div>
                        <label class="text-sm text-gray-600">Theory</label>
                        <input type="number" name="theory_marks"
                               class="w-full border border-gray-300 p-2 rounded-lg"
                               placeholder="70">
                    </div>

                    <div>
                        <label class="text-sm text-gray-600">Internal</label>
                        <input type="number" name="internal_marks"
                               class="w-full border border-gray-300 p-2 rounded-lg"
                               placeholder="30">
                    </div>

                </div>

                <p class="text-xs text-gray-400 mt-2">
                    ⚠️ Theory + Internal should equal Full Marks
                </p>

            </div>

            <!-- BUTTONS -->
            <div class="flex justify-between items-center pt-4">

                <a href="/courses/" 
                   class="text-gray-500 hover:text-gray-700 text-sm">
                    ← Back to Courses
                </a>

                <button type="submit"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg shadow transition">
                    Save Course
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
