{% extends "base.html" %}
{% block content %}

<div class="p-6 bg-gray-100 min-h-screen">

    <h2 class="text-2xl font-bold mb-6">Edit Attendance</h2>

    <!-- SESSION INFO -->
    <div class="bg-white p-5 rounded shadow mb-6">
        <p><strong>School:</strong> {{ session.school.name }}</p>
        <p><strong>Date:</strong> {{ session.date }}</p>
    </div>

    <!-- FORM -->
    <form method="POST">
        {% csrf_token %}

        <div class="bg-white p-4 rounded shadow">
            <table class="w-full text-sm">

                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-3 text-left">Student</th>
                        <th class="text-left">Status</th>
                    </tr>
                </thead>

                <tbody>
                    {% for r in records %}
                    <tr class="border-t">
                        <td class="p-3 font-medium">{{ r.student.username }}</td>
                        <td>
                            <select name="status_{{ r.id }}" class="border p-1 rounded">

                                <option value="present"
                                    {% if r.status == 'present' %}selected{% endif %}>
                                    Present
                                </option>

                                <option value="absent"
                                    {% if r.status == 'absent' %}selected{% endif %}>
                                    Absent
                                </option>

                            </select>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

        <!-- BUTTONS -->
        <div class="mt-6 flex gap-3">

            <button type="submit"
                    class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">
                💾 Save Changes
            </button>

            <a href="{% url 'attendance_detail' session.id %}"
               class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded">
                Cancel
            </a>

        </div>

    </form>

</div>

{% endblock %}
