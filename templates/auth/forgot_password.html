{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-100">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

        <h2 class="text-2xl font-bold text-center mb-2">Reset Password</h2>
        <p class="text-sm text-gray-500 text-center mb-6">
            Enter your username and set a new password
        </p>

        <form method="POST">
            {% csrf_token %}

            <!-- USERNAME -->
            <div class="mb-4">
                <label class="text-sm text-gray-600">Username</label>
                <input type="text" name="username"
                       class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                       placeholder="Enter your username"
                       required>
            </div>

            <!-- NEW PASSWORD -->
            <div class="mb-4">
                <label class="text-sm text-gray-600">New Password</label>
                <input type="password" name="new_password"
                       class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"
                       placeholder="Enter new password"
                       required>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="mb-4">
                <label class="text-sm text-gray-600">Confirm Password</label>
                <input type="password" name="confirm_password"
                       class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none"
                       placeholder="Confirm password"
                       required>
            </div>

            <button type="submit"
                    class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
                Reset Password
            </button>
        </form>

        <!-- MESSAGES -->
        {% if messages %}
            {% for message in messages %}
                <p class="text-sm mt-3 text-center
                    {% if message.tags == 'error' %}text-red-500
                    {% elif message.tags == 'success' %}text-green-600
                    {% else %}text-gray-600{% endif %}">
                    {{ message }}
                </p>
            {% endfor %}
        {% endif %}

        <!-- 🔥 FIXED BACK LINK -->
        <div class="mt-6 text-center">
            <a href="/" class="text-blue-600 text-sm hover:underline">
                ← Back to Home
            </a>
        </div>

    </div>

</div>

{% endblock %}
