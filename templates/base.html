{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexolabs Academy</title>


<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Inter', sans-serif;
    }
</style>


</head>

<body class="bg-gray-100">

<!-- NAVBAR -->
<nav class="bg-white border-b shadow-sm w-full">

    <div class="px-6 py-3 flex items-center justify-between">

        <!-- LEFT -->
        <div class="flex items-center gap-3">

            <img src="{% static 'images/logo.png' %}" 
                 class="w-10 h-10 rounded-full object-cover border">

            <div>
                <h1 class="text-sm font-semibold text-gray-800">
                    Nexolabs Academy
                </h1>
                <p class="text-xs text-gray-500">
                    Gaighat, Udayapur
                </p>
            </div>

        </div>

        <!-- CENTER -->
        <div class="hidden md:block text-sm text-gray-500 italic">
            Empowering Future Innovators with AI & Robotics
        </div>

        <!-- RIGHT -->
        <div class="flex items-center gap-4">

            <div class="hidden md:block text-sm text-gray-600">
                {{ request.user }}
            </div>

            <a href="/logout/"
               class="text-sm px-4 py-1.5 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition">
                Logout
            </a>

        </div>

    </div>

</nav>

<!-- MAIN (FULL WIDTH - NO LIMIT) -->
<main class="p-6 w-full">
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
