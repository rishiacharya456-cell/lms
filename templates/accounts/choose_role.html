<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexolabs Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen text-gray-800 relative overflow-hidden">

    <!-- 🌄 BACKGROUND -->
    <div class="absolute inset-0">
        <img src="https://images.unsplash.com/photo-1588072432836-e10032774350"
             class="w-full h-full object-cover opacity-30">
    </div>
    <div class="absolute inset-0 bg-white/85"></div>

    <!-- 🔷 HEADER (UUCMS STYLE BIG) -->
    <div class="relative z-20 bg-white shadow-md border-b">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center gap-4">

            <!-- BIG LOGO -->
            <img src="/static/images/logo.png" class="w-16 h-16 object-contain">

            <div>
                <h1 class="text-2xl font-bold text-blue-900">Nexolabs Academy Portal</h1>
                <p class="text-sm text-gray-600">Gaighat, Udyapur • 📞 9864162895</p>
            </div>

        </div>
    </div>

    <!-- 🔥 MAIN -->
    <div class="relative z-10 max-w-6xl mx-auto px-6 py-12">

        <!-- TITLE -->
        <div class="mb-10">
            <h2 class="text-4xl font-semibold text-gray-900 mb-2">
                Choose Your Role
            </h2>
            <p class="text-gray-600">
                Select your portal to access system features
            </p>
        </div>

        <!-- 🚀 ROLE GRID -->
        <div class="grid md:grid-cols-2 gap-10">

            <!-- SUPER ADMIN -->
            <a href="/login/super_admin/"
               class="group bg-white rounded-2xl shadow-lg hover:shadow-2xl transition overflow-hidden">

                <img src="https://images.unsplash.com/photo-1557804506-669a67965ba0"
                     class="w-full h-40 object-cover">

                <div class="p-6 flex justify-between items-center">
                    <div>
                        <h3 class="text-xl font-semibold text-blue-800">Management</h3>
                        <p class="text-gray-600 text-sm">Full system control</p>
                    </div>
                </div>

            </a>

            <!-- SCHOOL -->
            <a href="/login/school_admin/"
               class="group bg-white rounded-2xl shadow-lg hover:shadow-2xl transition overflow-hidden">

                <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7"
                     class="w-full h-40 object-cover">

                <div class="p-6 flex justify-between items-center">
                    <div>
                        <h3 class="text-xl font-semibold text-green-700">School</h3>
                        <p class="text-gray-600 text-sm">Manage school system</p>
                    </div>
                </div>

            </a>

            <!-- TRAINER -->
            <a href="/login/trainer/"
               class="group bg-white rounded-2xl shadow-lg hover:shadow-2xl transition overflow-hidden">

                <img src="https://images.unsplash.com/photo-1577896851231-70ef18881754"
                     class="w-full h-40 object-cover">

                <div class="p-6 flex justify-between items-center">
                    <div>
                        <h3 class="text-xl font-semibold text-purple-700">Trainer</h3>
                        <p class="text-gray-600 text-sm">Teaching & training</p>
                    </div>
                </div>

            </a>

            <!-- STUDENT -->
            <a href="/login/student/"
               class="group bg-white rounded-2xl shadow-lg hover:shadow-2xl transition overflow-hidden">

                <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644"
                     class="w-full h-40 object-cover">

                <div class="p-6 flex justify-between items-center">
                    <div>
                        <h3 class="text-xl font-semibold text-pink-700">Student</h3>
                        <p class="text-gray-600 text-sm">Learning dashboard</p>
                    </div>
                </div>

            </a>

        </div>

    </div>

    <!-- 🔻 FOOTER -->
    <div class="bg-gray-100 border-t mt-10">
        <div class="max-w-6xl mx-auto px-6 py-4 text-center text-sm text-gray-600">
            © 2026 Nexolabs Academy • Email: info@nexolabs.com.np
        </div>

</html>
